services:
    db:
        image: postgres:16
        container_name: concurrencia-db
        environment:
            POSTGRES_DB: concurrencia
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d concurrencia"]
            interval: 3s
            timeout: 3s
            retries: 20
        volumes:
            - postgres_data:/var/lib/postgresql/data

    init-db:
        image: postgres:16
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGPASSWORD: postgres
        volumes:
            - ./init:/sql
        command: >
            sh -c "psql -h db -U postgres -d concurrencia -f /sql/init.sql"
        restart: "no"

    worker:
        build: ./worker
        depends_on:
            db:
                condition: service_healthy
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_NAME: concurrencia
            DB_USER: postgres
            DB_PASSWORD: postgres
            SHARED_FILE: /shared/results.log
        volumes:
            - ./shared:/shared
        restart: "no"

volumes:
    postgres_data: